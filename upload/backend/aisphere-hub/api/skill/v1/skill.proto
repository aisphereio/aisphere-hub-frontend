syntax = "proto3";

package api.skill.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "aisphere-hub/api/skill/v1;v1";

// SkillService exposes the canonical AIHub Skill API.
//
// This service is the first real business module migrated from the legacy
// backend into the new kratos+kit Hub. It intentionally uses canonical,
// namespace-free resources and a structured PostgreSQL table.
service SkillService {
  // CreateSkill creates one canonical skill.
  rpc CreateSkill(CreateSkillRequest) returns (Skill) {
    option (google.api.http) = {
      post: "/v3/aihub/skills"
      body: "*"
    };
  }

  // UpdateSkill updates mutable fields of one canonical skill.
  rpc UpdateSkill(UpdateSkillRequest) returns (Skill) {
    option (google.api.http) = {
      put: "/v3/aihub/skills/{name}"
      body: "*"
    };
  }

  // ListSkills lists canonical skills for management views.
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse) {
    option (google.api.http) = {
      get: "/v3/aihub/skills"
    };
  }

  // GetSkill returns one canonical skill by name for management views.
  rpc GetSkill(GetSkillRequest) returns (Skill) {
    option (google.api.http) = {
      get: "/v3/aihub/skills/{name}"
    };
  }

  // DeleteSkill soft-deletes one canonical skill by name.
  rpc DeleteSkill(DeleteSkillRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v3/aihub/skills/{name}"
    };
  }

  // UploadSkillPackage imports a zipped Skill package into draft version files.
  rpc UploadSkillPackage(UploadSkillPackageRequest) returns (SkillVersion) {
    option (google.api.http) = {
      post: "/v3/aihub/skills:upload"
      body: "*"
    };
  }

  // ListSkillVersions lists versions of one canonical skill.
  rpc ListSkillVersions(ListSkillVersionsRequest) returns (ListSkillVersionsResponse) {
    option (google.api.http) = {
      get: "/v3/aihub/skills/{name}/versions"
    };
  }

  // GetSkillVersion returns one version metadata record.
  rpc GetSkillVersion(GetSkillVersionRequest) returns (SkillVersion) {
    option (google.api.http) = {
      get: "/v3/aihub/skills/{name}/versions/{version}"
    };
  }

  // SubmitSkillVersion marks a draft version ready for publish.
  rpc SubmitSkillVersion(SkillVersionActionRequest) returns (SkillVersion) {
    option (google.api.http) = {
      post: "/v3/aihub/skills/{name}/versions/{version}:submit"
      body: "*"
    };
  }

  // PublishSkillVersion marks a submitted version as published.
  rpc PublishSkillVersion(SkillVersionActionRequest) returns (SkillVersion) {
    option (google.api.http) = {
      post: "/v3/aihub/skills/{name}/versions/{version}:publish"
      body: "*"
    };
  }

  // ForcePublishSkillVersion lets an operator publish without normal submit state.
  rpc ForcePublishSkillVersion(SkillVersionActionRequest) returns (SkillVersion) {
    option (google.api.http) = {
      post: "/v3/aihub/skills/{name}/versions/{version}:force-publish"
      body: "*"
    };
  }

  // OnlineSkillVersion makes one published version consumable by catalog/runtime.
  rpc OnlineSkillVersion(SkillVersionActionRequest) returns (SkillVersion) {
    option (google.api.http) = {
      post: "/v3/aihub/skills/{name}/versions/{version}:online"
      body: "*"
    };
  }

  // OfflineSkillVersion removes one online version from catalog/runtime use.
  rpc OfflineSkillVersion(SkillVersionActionRequest) returns (SkillVersion) {
    option (google.api.http) = {
      post: "/v3/aihub/skills/{name}/versions/{version}:offline"
      body: "*"
    };
  }

  // DownloadSkillVersion returns the version package bytes with cache metadata.
  rpc DownloadSkillVersion(DownloadSkillVersionRequest) returns (SkillPackageDownload) {
    option (google.api.http) = {
      get: "/v3/aihub/skills/{name}/versions/{version}/download"
    };
  }

  // ListSkillVersionFiles lists files stored for one skill version.
  rpc ListSkillVersionFiles(ListSkillVersionFilesRequest) returns (ListSkillVersionFilesResponse) {
    option (google.api.http) = {
      get: "/v3/aihub/skills/{name}/versions/{version}/files"
    };
  }

  // GetSkillVersionFile returns one text or base64-encoded file content.
  rpc GetSkillVersionFile(GetSkillVersionFileRequest) returns (SkillFile) {
    option (google.api.http) = {
      get: "/v3/aihub/skills/{name}/versions/{version}/file"
    };
  }

  // CompareSkillVersions returns SKILL.md and file lists for two versions.
  rpc CompareSkillVersions(CompareSkillVersionsRequest) returns (CompareSkillVersionsResponse) {
    option (google.api.http) = {
      get: "/v3/aihub/skills/{name}/compare"
    };
  }

  // ListSkillShares lists Casdoor/Casbin policy grants created for one Skill.
  rpc ListSkillShares(ListSkillSharesRequest) returns (ListSkillSharesResponse) {
    option (google.api.http) = {
      get: "/v3/aihub/skills/{name}/shares"
    };
  }

  // CreateSkillShare grants one user/service/app/agent/workflow access to one Skill.
  rpc CreateSkillShare(CreateSkillShareRequest) returns (SkillShare) {
    option (google.api.http) = {
      post: "/v3/aihub/skills/{name}/shares"
      body: "*"
    };
  }

  // DeleteSkillShare revokes all policy actions for one subject on one Skill.
  rpc DeleteSkillShare(DeleteSkillShareRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v3/aihub/skills/{name}/shares/{grant_id}"
    };
  }

  // ListCatalogSkills lists skills visible to the current user/service consumer.
  rpc ListCatalogSkills(ListCatalogSkillsRequest) returns (ListCatalogSkillsResponse) {
    option (google.api.http) = {
      get: "/v3/aihub/catalog/skills"
    };
  }

  // GetCatalogSkill returns one skill for Agent/Runtime/Catalog consumers.
  rpc GetCatalogSkill(GetCatalogSkillRequest) returns (Skill) {
    option (google.api.http) = {
      get: "/v3/aihub/catalog/skills/{name}"
    };
  }

  // GetCatalogSkillManifest returns the online version manifest for runtime consumers.
  rpc GetCatalogSkillManifest(GetCatalogSkillManifestRequest) returns (SkillManifest) {
    option (google.api.http) = {
      get: "/v3/aihub/catalog/skills/{name}/manifest"
    };
  }

  // DownloadCatalogSkillVersion returns the package for a catalog-consumable version.
  rpc DownloadCatalogSkillVersion(DownloadSkillVersionRequest) returns (SkillPackageDownload) {
    option (google.api.http) = {
      get: "/v3/aihub/catalog/skills/{name}/versions/{version}/download"
    };
  }
}

message Skill {
  int64 id = 1;
  string name = 2;
  string display_name = 3;
  string description = 4;
  string version = 5;
  string status = 6;
  string visibility = 7;
  string owner_id = 8;
  string org_id = 9;
  string project_id = 10;
  string source_type = 11;
  string source_uri = 12;
  string manifest_json = 13;
  repeated string tags = 14;
  google.protobuf.Timestamp create_time = 15;
  google.protobuf.Timestamp update_time = 16;
}

message CreateSkillRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string display_name = 2;
  string description = 3;
  string version = 4;
  string status = 5;
  string visibility = 6;
  string owner_id = 7;
  string org_id = 8;
  string project_id = 9;
  string source_type = 10;
  string source_uri = 11;
  string manifest_json = 12;
  repeated string tags = 13;
}

message UpdateSkillRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string display_name = 2;
  string description = 3;
  string version = 4;
  string status = 5;
  string visibility = 6;
  string owner_id = 7;
  string org_id = 8;
  string project_id = 9;
  string source_type = 10;
  string source_uri = 11;
  string manifest_json = 12;
  repeated string tags = 13;
}

message ListSkillsRequest {
  int32 page_size = 1;
  string page_token = 2;
  string q = 3;
  string status = 4;
  string visibility = 5;
}

message ListSkillsResponse {
  repeated Skill skills = 1;
  string next_page_token = 2;
}

message GetSkillRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
}

message DeleteSkillRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
}

message UploadSkillPackageRequest {
  bytes package_bytes = 1 [(google.api.field_behavior) = REQUIRED];
  bool overwrite = 2;
  string target_version = 3;
  string commit_msg = 4;
}

message SkillVersion {
  int64 id = 1;
  string skill_name = 2;
  string version = 3;
  string status = 4;
  string author = 5;
  string commit_msg = 6;
  string publish_pipeline_info = 7;
  int64 download_count = 8;
  string md5 = 9;
  string sha256 = 10;
  string revision = 11;
  int64 size_bytes = 12;
  string manifest_json = 13;
  google.protobuf.Timestamp create_time = 14;
  google.protobuf.Timestamp update_time = 15;
}

message ListSkillVersionsRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
}

message ListSkillVersionsResponse {
  repeated SkillVersion versions = 1;
}

message GetSkillVersionRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string version = 2 [(google.api.field_behavior) = REQUIRED];
}

message SkillVersionActionRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string version = 2 [(google.api.field_behavior) = REQUIRED];
}

message DownloadSkillVersionRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string version = 2 [(google.api.field_behavior) = REQUIRED];
  string if_none_match = 3;
}

message SkillPackageDownload {
  string skill_name = 1;
  string version = 2;
  string etag = 3;
  string md5 = 4;
  string sha256 = 5;
  bool not_modified = 6;
  bytes package_bytes = 7;
}

message SkillFile {
  int64 id = 1;
  string skill_name = 2;
  string version = 3;
  string path = 4;
  string name = 5;
  string type = 6;
  int64 size = 7;
  bool binary = 8;
  string content = 9;
  google.protobuf.Timestamp create_time = 10;
  google.protobuf.Timestamp update_time = 11;
}

message ListSkillVersionFilesRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string version = 2 [(google.api.field_behavior) = REQUIRED];
}

message ListSkillVersionFilesResponse {
  repeated SkillFile files = 1;
}

message GetSkillVersionFileRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string version = 2 [(google.api.field_behavior) = REQUIRED];
  string path = 3 [(google.api.field_behavior) = REQUIRED];
}

message CompareSkillVersionsRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string base_version = 2 [(google.api.field_behavior) = REQUIRED];
  string target_version = 3 [(google.api.field_behavior) = REQUIRED];
}

message CompareSkillVersionsResponse {
  string base_version = 1;
  string target_version = 2;
  string base_skill_md = 3;
  string target_skill_md = 4;
  repeated SkillFile base_files = 5;
  repeated SkillFile target_files = 6;
}

message SkillShare {
  string grant_id = 1;
  string resource = 2;
  string subject = 3;
  string subject_type = 4;
  string subject_id = 5;
  string role = 6;
  repeated string actions = 7;
  string created_by = 8;
  string metadata_json = 9;
}

message ListSkillSharesRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
}

message ListSkillSharesResponse {
  repeated SkillShare shares = 1;
}

message CreateSkillShareRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string subject_type = 2 [(google.api.field_behavior) = REQUIRED];
  string subject_id = 3;
  string org_id = 4;
  string project_id = 5;
  string role = 6;
  repeated string actions = 7;
  string metadata_json = 8;
}

message DeleteSkillShareRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string grant_id = 2 [(google.api.field_behavior) = REQUIRED];
}

message ListCatalogSkillsRequest {
  int32 page_size = 1;
  string page_token = 2;
  string q = 3;
}

message ListCatalogSkillsResponse {
  repeated Skill skills = 1;
  string next_page_token = 2;
}

message GetCatalogSkillRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
}

message GetCatalogSkillManifestRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string if_none_match = 2;
}

message SkillManifest {
  string skill_name = 1;
  string version = 2;
  string status = 3;
  string etag = 4;
  string md5 = 5;
  string sha256 = 6;
  string revision = 7;
  string manifest_json = 8;
  repeated SkillFile files = 9;
  bool not_modified = 10;
}
