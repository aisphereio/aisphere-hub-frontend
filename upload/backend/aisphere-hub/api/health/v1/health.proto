// aisphere-hub backend health service definition.
//
// This is a Phase 1 smoke-test proto. It exists to:
//   1. Verify the buf/protoc toolchain works on the developer's machine.
//   2. Give the kratos HTTP server at least one non-/livez route to exercise
//      the middleware chain.
//
// Once business modules start migrating (Phase 3+), each module gets its own
// proto under api/<module>/v1/<module>.proto. This health.proto can stay as
// a lightweight liveness/readiness complement to /livez and /readyz.

syntax = "proto3";

package api.health.v1;

option go_package = "aisphere-hub/api/health/v1;v1";

import "google/api/annotations.proto";

// HealthService exposes a single Check RPC used by the kratos HTTP server
// as a smoke-test endpoint during Phase 1.
service HealthService {
  // Check returns the current service health snapshot.
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse) {
    option (google.api.http) = {
      get: "/v3/aihub/health"
    };
  }
}

message HealthCheckRequest {
  // Optional component name to check; empty means "all components".
  string component = 1;
}

message HealthCheckResponse {
  // Overall status: "ok" or "degraded".
  string status = 1;
  // Unix timestamp (seconds) of the check.
  int64 checked_at = 2;
  // Per-component details, keyed by component name.
  map<string, string> components = 3;
}
