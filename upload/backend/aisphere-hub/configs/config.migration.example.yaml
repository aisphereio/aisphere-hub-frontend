# Optional overlay for aisphere-kit SQL migration runner.
# Copy this block into configs/config.yaml or start Hub with multiple config files
# once the entrypoint supports overlays.
#
# Dev convenience:
#   auto_apply: true
# Production recommendation:
#   auto_apply: false and run migrations explicitly before deployment.

migration:
  enabled: true
  auto_apply: true
  driver: postgres
  path: "./migrations/postgres"
  table: "schema_migrations"
  lock: true
  allow_dirty: false
  timeout: "30s"
