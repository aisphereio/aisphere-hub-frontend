# aisphere-hub backend (kratos+kit) configuration.
#
# This is the kit schema (aisphere-kit/config.Config). It is SEPARATE from the
# legacy config.yaml read by cmd/skillhub/main.go. Both files coexist during the
# migration period; legacy Gin server keeps using config.yaml, new kratos server
# uses config.kratos.yaml.
#
# Once Phase 7 is complete, config.kratos.yaml replaces config.yaml.

app:
  name: aisphere-hub
  env: dev
  version: dev

server:
  http:
    # Same port as legacy backend to enable traffic comparison during migration.
    # Switch to a different port (e.g. :8849) if you want both servers running
    # simultaneously for side-by-side validation.
    addr: "0.0.0.0:8848"
    timeout: "30s"
  grpc:
    addr: "0.0.0.0:9090"
    timeout: "30s"

features:
  # DB is ON: kit now supports Postgres natively (aisphere-kit v0.1.0-pg-fix).
  # We reuse the same Postgres instance as the legacy backend.
  db: true
  cache: true
  s3: true
  # AuthN/AuthZ/Audit/Permission will be turned on in Phase 2 once we wrap the
  # legacy providers as kit interfaces. For Phase 1 they stay OFF so the
  # skeleton can boot without Casdoor / aisphere-auth dependencies.
  authn: false
  authz: false
  audit: false
  permission: false
  metrics: true
  session: true
  tracing: false
  # sharing is deprecated and MUST stay false.
  sharing: false

log:
  level: info
  format: json
  add_source: false

# Postgres via the new db.DatabaseConfig. kit auto-creates the database when
# auto_create_database=true (matches legacy config.yaml's `autoCreate: true`).
database:
  driver: postgres
  dsn: "host=36.138.61.152 port=30432 user=postgres password=Postgres@123456 dbname=aisphere_hub sslmode=disable"
  auto_create_database: true
  maintenance_db: postgres
  # Optional: dedicated schema for kratos+kit tables. Leave empty to use the
  # default "public" schema shared with the legacy backend. Set to "aihub"
  # to isolate new tables created by GORM AutoMigrate.
  search_path: ""
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: "1h"
  slow_threshold: "500ms"
  log_level: warn

# Redis: reuses the same instance as the legacy backend's cache.redis config.
redis:
  mode: single
  addrs:
    - "36.138.61.152:30011"
  username: ""
  password: "MyS3cureP@ss"
  db: 0
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"

# MinIO/S3: reuses the same instance as the legacy backend's objectStore.s3.
objectstore:
  provider: minio
  endpoint: "36.138.61.152:30093"
  access_key: "minioadmin"
  secret_key: "minioadmin@123"
  bucket: "aihub"
  use_ssl: false
  region: ""
  # force_path_style maps to the legacy `forcePathStyle: true` flag.
  force_path_style: true

# Casdoor / aisphere-auth: populated but currently unused (features.authn=false).
# Turned on in Phase 2 once the wrapper modules are in place.
casdoor:
  endpoint: ""
  client_id: ""
  client_secret: ""
  organization: ""
  application: ""
  # Use aisphere-auth remote enforcer instead of Casdoor in this deployment.
  # Leave the casdoor-* selectors empty; Phase 2 will inject an aisphere-auth
  # adapter via starter.WithAuthz / starter.WithAuthn / starter.WithAudit.
  permission_id: ""
  model_id: ""
  resource_id: ""
  enforcer_id: ""
  owner: ""
  policy_enforcer: ""
  http_timeout: "10s"

metrics:
  namespace: aisphere_hub

session:
  key_prefix: "aisphere:session"
  state_ttl: "10m"
  blacklist_prefix: "aisphere:session:blacklist"

health:
  timeout: "2s"

shutdown:
  timeout: "15s"
