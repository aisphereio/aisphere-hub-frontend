# aisphere-hub backend (kratos+kit) configuration.
#
# This is the kit schema (aisphere-kit/config.Config). It replaces the
# kratos-template config.yaml that shipped with `kratos new`.
#
# The legacy config.kratos.yaml is no longer needed; this file is the single
# source of truth for the kratos+kit entry point (cmd/aispherehub/main.go).

app:
  name: aisphere-hub
  env: dev
  version: v0.1.0

server:
  http:
    addr: "0.0.0.0:18001"
    timeout: "30s"
  grpc:
    addr: "0.0.0.0:19000"
    timeout: "30s"

features:
  # Phase 1: infrastructure is ON so /readyz and /v3/aihub/health actually
  # ping real dependencies. AuthN/AuthZ/Audit/Permission stay OFF until
  # Phase 2 wraps the legacy providers as kit interfaces.
  db: true
  cache: true
  s3: true
  authn: true
  authz: true
  audit: false
  permission: true
  metrics: true
  session: true
  tracing: false
  # sharing is deprecated and MUST stay false.
  sharing: false

log:
  level: debug
  format: json
  add_source: false

# Postgres via the new db.DatabaseConfig (aisphere-kit v0.1.1+).
# kit auto-creates the database when auto_create_database=true.
database:
  driver: postgres
  dsn: "host=36.138.61.152 port=30432 user=postgres password=Postgres@123456 dbname=aisphere_hub sslmode=disable"
  auto_create_database: true
  maintenance_db: postgres
  # Optional: dedicated schema for kratos+kit tables. Leave empty to use the
  # default "public" schema shared with the legacy backend.
  search_path: ""
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: "1h"
  slow_threshold: "500ms"
  log_level: warn

migration:
  enabled: true
  auto_apply: true
  driver: postgres
  path: "./migrations/postgres"
  table: "schema_migrations"
  lock: true
  allow_dirty: false
  timeout: "30s"


# Redis: reuses the legacy backend's cache.redis config.
redis:
  mode: single
  addr: "36.138.61.152:30011"
  username: ""
  password: "MyS3cureP@ss"
  db: 0
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"

# MinIO/S3: reuses the legacy backend's objectStore.s3 config.
objectstore:
  provider: minio
  endpoint: "36.138.61.152:30093"
  access_key: "minioadmin"
  secret_key: "minioadmin@123"
  bucket: "aihub"
  use_ssl: false
  region: ""
  force_path_style: true

# Casdoor / aisphere-auth. Hub does not issue local tokens; it consumes
# Casdoor OAuth access tokens through aisphere-kit authn middleware.
casdoor:
  endpoint: "http://localhost:18000"
  client_id: "aisphere-auth"
  client_secret: "aisphere_p9G3cSCVQKIvtZHN1oISQ_rDlGGtm3VgoZ9mAcnIXOM"

  organization: "aisphere"
  application: "aisphere"
  # 全局 RBAC：role_aihub_admin -> aihub:* / *
  # permission_id: "aisphere/ 全局 RBAC：role_aihub_admin -> aihub:* / *
  permission_id: "aisphere/perm_aihub_admin"

  # 动态分享：test3 只能读某一个 skill，agent-platform 只能 consume 某一个 skill
  policy_enforcer: "enforcer_aisphere"

  # 可省略；默认按 organization 推导为 aisphere/aisphere_policy_rule
  policy_adapter_id: "aisphere_policy_rule"

  model_id: ""
  resource_id: ""
  enforcer_id: ""
  owner: ""

