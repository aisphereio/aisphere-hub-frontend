app:
  name: aisphere-hub
  env: dev
  version: v0.1.0

server:
  http:
    addr: 0.0.0.0:8000
    timeout: 10s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 10s

features:
  db: true
  cache: true
  s3: true
  authn: false
  authz: false
  audit: false
  metrics: true
  session: true
  permission: false
  sharing: false

log:
  level: debug
  format: json

database:
  driver: mysql
  dsn: root:root@tcp(127.0.0.1:3306)/aisphere_hub?charset=utf8mb4&parseTime=True&loc=Local
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 1h
  slow_threshold: 500ms
  log_level: warn

redis:
  mode: single
  addr: 127.0.0.1:6379
  db: 0

objectstore:
  provider: minio
  endpoint: 127.0.0.1:9000
  access_key: minioadmin
  secret_key: minioadmin
  bucket: aisphere-hub
  use_ssl: false

session:
  key_prefix: aisphere:hub:session
  state_ttl: 10m
  blacklist_prefix: aisphere:hub:token:blacklist
