# Overlay example for local Casdoor OAuth testing.
# Usage on Windows PowerShell:
#   $env:AISPHERE_CONFIG="configs/config.yaml,configs/config.casdoor.example.yaml"
#   go run ./cmd/aispherehub

features:
  authn: true
  authz: false
  audit: false
  permission: false

casdoor:
  endpoint: "http://localhost:18000"
  client_id: "aisphere-auth"
  client_secret: "replace-with-casdoor-application-secret"
  organization: "built-in"
  application: "aisphere-auth"
  certificate: |
    -----BEGIN CERTIFICATE-----
    replace-with-casdoor-application-certificate
    -----END CERTIFICATE-----
  default_scope: "openid profile email"
  http_timeout: "10s"
