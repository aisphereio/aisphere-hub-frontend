name: Apply Release UI

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-release-ui.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Integrate Releases tab
        run: |
          python - <<'PY'
          from pathlib import Path

          editor = Path('src/components/editor/skill-editor.tsx')
          text = editor.read_text()

          replacements = {
              'import { PullRequestsPanel } from "./pull-requests-panel";':
                  'import { PullRequestsPanel } from "./pull-requests-panel";\nimport { SkillReleasesPanel } from "./skill-releases-panel";',
              'type RightPanelTab = "overview" | "settings" | "shares" | "prs";':
                  'type RightPanelTab = "overview" | "settings" | "shares" | "prs" | "releases";',
              '''                  <TabsTrigger
                    value="prs"
                    className="h-8 shrink-0 whitespace-nowrap px-3 text-xs data-[state=active]:bg-violet-600/10 data-[state=active]:text-violet-600"
                  >
                    Pull Requests
                  </TabsTrigger>''':
                  '''                  <TabsTrigger
                    value="prs"
                    className="h-8 shrink-0 whitespace-nowrap px-3 text-xs data-[state=active]:bg-violet-600/10 data-[state=active]:text-violet-600"
                  >
                    Pull Requests
                  </TabsTrigger>
                  <TabsTrigger
                    value="releases"
                    className="h-8 shrink-0 whitespace-nowrap px-3 text-xs data-[state=active]:bg-violet-600/10 data-[state=active]:text-violet-600"
                  >
                    Releases
                  </TabsTrigger>''',
              '''                {/* PULL REQUESTS */}
                <TabsContent value="prs" className="p-3 mt-0">
                  <PullRequestsPanel skillName={detail.name} />
                </TabsContent>''':
                  '''                {/* PULL REQUESTS */}
                <TabsContent value="prs" className="p-3 mt-0">
                  <PullRequestsPanel skillName={detail.name} />
                </TabsContent>

                {/* RELEASES */}
                <TabsContent value="releases" className="p-3 mt-0">
                  <SkillReleasesPanel skillName={detail.name} />
                </TabsContent>''',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'expected editor fragment not found: {old!r}')
              text = text.replace(old, new, 1)
          editor.write_text(text)

          index = Path('src/lib/api/index.ts')
          text = index.read_text()
          old = "export { skillApi } from './adapters/skill';"
          new = old + "\n\n// skillReleaseApi wraps the generated immutable SkillReleaseService client.\nexport { skillReleaseApi } from './adapters/skill-release';"
          if old not in text:
              raise SystemExit('skillApi export anchor not found')
          index.write_text(text.replace(old, new, 1))
          PY
      - name: Commit UI integration
        env:
          TARGET_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/editor/skill-editor.tsx src/lib/api/index.ts
          git commit -m 'feat(skill): expose immutable releases in editor'
          git fetch origin "$TARGET_REF"
          git rebase "origin/$TARGET_REF"
          git push origin HEAD:"$TARGET_REF"
