name: Apply Release UI

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-release-ui.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Integrate Releases tab
        run: |
          python - <<'PY'
          from pathlib import Path

          editor = Path('src/components/editor/skill-editor.tsx')
          text = editor.read_text()

          def insert_after(anchor: str, addition: str, label: str) -> None:
              global text
              if anchor not in text:
                  raise SystemExit(f'{label} anchor not found')
              text = text.replace(anchor, anchor + addition, 1)

          release_import = 'import { SkillReleasesPanel } from "./skill-releases-panel";'
          if release_import not in text:
              insert_after(
                  'import { PullRequestsPanel } from "./pull-requests-panel";',
                  '\n' + release_import,
                  'pull request import',
              )

          old_tabs = 'type RightPanelTab = "overview" | "settings" | "shares" | "prs";'
          new_tabs = 'type RightPanelTab = "overview" | "settings" | "shares" | "prs" | "releases";'
          if old_tabs in text:
              text = text.replace(old_tabs, new_tabs, 1)
          elif new_tabs not in text:
              raise SystemExit('right panel tab type anchor not found')

          if '<TabsTrigger\n                    value="releases"' not in text:
              trigger_end = '                    Pull Requests\n                  </TabsTrigger>'
              release_trigger = '''
                  <TabsTrigger
                    value="releases"
                    className="h-8 shrink-0 whitespace-nowrap px-3 text-xs data-[state=active]:bg-violet-600/10 data-[state=active]:text-violet-600"
                  >
                    Releases
                  </TabsTrigger>'''
              insert_after(trigger_end, release_trigger, 'pull request trigger')

          if '<SkillReleasesPanel skillName={detail.name} />' not in text:
              content_end = '                  <PullRequestsPanel skillName={detail.name} />\n                </TabsContent>'
              release_content = '''

                {/* RELEASES */}
                <TabsContent value="releases" className="p-3 mt-0">
                  <SkillReleasesPanel skillName={detail.name} />
                </TabsContent>'''
              insert_after(content_end, release_content, 'pull request content')

          editor.write_text(text)

          index = Path('src/lib/api/index.ts')
          index_text = index.read_text()
          release_export = "export { skillReleaseApi } from './adapters/skill-release';"
          if release_export not in index_text:
              anchor = "export { skillApi } from './adapters/skill';"
              if anchor not in index_text:
                  raise SystemExit('skillApi export anchor not found')
              index_text = index_text.replace(
                  anchor,
                  anchor + "\n\n// skillReleaseApi wraps the generated immutable SkillReleaseService client.\n" + release_export,
                  1,
              )
          index.write_text(index_text)
          PY
      - name: Commit UI integration
        env:
          TARGET_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet -- src/components/editor/skill-editor.tsx src/lib/api/index.ts; then
            echo 'Release UI is already integrated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/editor/skill-editor.tsx src/lib/api/index.ts
          git commit -m 'feat(skill): expose immutable releases in editor'
          git fetch origin "$TARGET_REF"
          git rebase "origin/$TARGET_REF"
          git push origin HEAD:"$TARGET_REF"
