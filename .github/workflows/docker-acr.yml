name: Docker image

on:
  push:
    branches:
      - main
      - 'feat/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - 'feat/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional extra image tag to publish
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: hub-frontend-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: aisphere-hub-front

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=sha-
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_HUB_URL=
            NEXT_PUBLIC_IAM_URL=
            NEXT_PUBLIC_AUTH_MODE=gateway_oidc
            NEXT_PUBLIC_GATEWAY_LOGOUT_PATH=/logout
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
