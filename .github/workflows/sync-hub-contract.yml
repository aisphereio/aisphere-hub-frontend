name: Sync Hub Contract

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
    paths:
      - 'openapi/hub-contract.ref'
      - 'scripts/sync-contract.mjs'
      - '.github/workflows/sync-hub-contract.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'openapi/hub-contract.ref'
      - 'scripts/sync-contract.mjs'
      - '.github/workflows/sync-hub-contract.yml'
  workflow_dispatch:
    inputs:
      hub_ref:
        description: Optional Hub branch, tag, or commit override
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: sync-hub-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Resolve pinned Hub contract
        id: contract
        env:
          INPUT_REF: ${{ inputs.hub_ref }}
        run: |
          if [ -n "$INPUT_REF" ]; then
            HUB_REF="$INPUT_REF"
          else
            HUB_REF="$(tr -d '[:space:]' < openapi/hub-contract.ref)"
          fi
          if ! [[ "$HUB_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Hub contract ref must be an immutable 40-character commit SHA: $HUB_REF" >&2
            exit 1
          fi
          echo "hub_ref=$HUB_REF" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: npm ci
      - name: Sync OpenAPI and regenerate Orval SDK
        run: npm run contract:sync -- --ref "${{ steps.contract.outputs.hub_ref }}"
      - name: Validate generated SDK
        id: validate
        continue-on-error: true
        run: |
          set -o pipefail
          {
            npm run contract:check
            npm run typecheck
            npm run test
          } 2>&1 | tee contract-sync-validation.log
      - name: Package diagnostics
        if: always()
        run: tar -czf contract-sync-diagnostics.tar.gz contract-sync-validation.log openapi src/lib/api/generated
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-sync-diagnostics
          path: contract-sync-diagnostics.tar.gz
          if-no-files-found: error
      - name: Stop on validation failure
        if: steps.validate.outcome == 'failure'
        run: exit 1
      - name: Commit contract and SDK
        env:
          TARGET_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if git diff --quiet -- openapi src/lib/api/generated; then
            echo 'Generated SDK is already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add openapi src/lib/api/generated
          git commit -m 'chore(api): sync generated Hub SDK'
          git fetch origin "$TARGET_REF"
          git rebase "origin/$TARGET_REF"
          git push origin HEAD:"$TARGET_REF"
