name: Apply K8s action gates

on:
  push:
    branches: [fix/k8s-environment-action-gates]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/k8s-environment-action-gates
      - name: Apply and commit permission gates
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/components/pages/environments-page.tsx')
          text = path.read_text()

          old_probe = '''                          <Button size="icon" variant="ghost" className="h-7 w-7" title="探测" onClick={(event) => {
                            event.stopPropagation();
                            if (cluster.id) probeCluster.mutate(cluster.id);
                          }}><Activity className="h-3.5 w-3.5" /></Button>'''
          new_probe = '''                          {cluster.permissions?.canOperate ? (
                            <Button size="icon" variant="ghost" className="h-7 w-7" title="探测" onClick={(event) => {
                              event.stopPropagation();
                              if (cluster.id) probeCluster.mutate(cluster.id);
                            }}><Activity className="h-3.5 w-3.5" /></Button>
                          ) : null}'''
          if old_probe not in text:
              raise SystemExit('probe action block not found')
          text = text.replace(old_probe, new_probe, 1)

          old_sync = '''                <Button size="sm" variant="outline" onClick={() => syncNamespaces.mutate()} disabled={syncNamespaces.isPending}>
                  <RefreshCw className={`h-3.5 w-3.5 mr-1 ${syncNamespaces.isPending ? 'animate-spin' : ''}`} /> 同步
                </Button>'''
          new_sync = '''                {selectedCluster.permissions?.canOperate ? (
                  <Button size="sm" variant="outline" onClick={() => syncNamespaces.mutate()} disabled={syncNamespaces.isPending}>
                    <RefreshCw className={`h-3.5 w-3.5 mr-1 ${syncNamespaces.isPending ? 'animate-spin' : ''}`} /> 同步
                  </Button>
                ) : null}'''
          if old_sync not in text:
              raise SystemExit('sync action block not found')
          text = text.replace(old_sync, new_sync, 1)

          old_create_open = '''            <Card>
              <CardHeader className="pb-3"><CardTitle className="text-sm flex items-center gap-2"><Plus className="h-4 w-4" /> 创建 Namespace</CardTitle></CardHeader>'''
          new_create_open = '''            {selectedCluster.permissions?.canCreateNamespace ? (
              <Card>
                <CardHeader className="pb-3"><CardTitle className="text-sm flex items-center gap-2"><Plus className="h-4 w-4" /> 创建 Namespace</CardTitle></CardHeader>'''
          if old_create_open not in text:
              raise SystemExit('create namespace card opening not found')
          text = text.replace(old_create_open, new_create_open, 1)

          old_create_close = '''              </CardContent>
            </Card>

            <Card>
              <CardHeader className="pb-3"><CardTitle className="text-sm flex items-center gap-2"><KeyRound className="h-4 w-4" /> 轮换集群凭据</CardTitle></CardHeader>'''
          new_create_close = '''                </CardContent>
              </Card>
            ) : null}

            {selectedCluster.permissions?.canManage ? (
              <Card>
                <CardHeader className="pb-3"><CardTitle className="text-sm flex items-center gap-2"><KeyRound className="h-4 w-4" /> 轮换集群凭据</CardTitle></CardHeader>'''
          if old_create_close not in text:
              raise SystemExit('create/rotate card boundary not found')
          text = text.replace(old_create_close, new_create_close, 1)

          old_rotate_close = '''              </CardContent>
            </Card>
          </div>'''
          new_rotate_close = '''                </CardContent>
              </Card>
            ) : null}
          </div>'''
          if old_rotate_close not in text:
              raise SystemExit('rotate card closing not found')
          text = text.replace(old_rotate_close, new_rotate_close, 1)

          path.write_text(text)
          PY

          rm .github/workflows/apply-k8s-action-gates.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/pages/environments-page.tsx .github/workflows/apply-k8s-action-gates.yml
          git commit -m 'fix(kubernetes): gate environment actions by permissions'
          git push origin HEAD:fix/k8s-environment-action-gates
