name: Inspect Workflow Definitions

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/inspect-workflows.yml'

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: workflow-definitions
          path: .github/workflows
          if-no-files-found: error
