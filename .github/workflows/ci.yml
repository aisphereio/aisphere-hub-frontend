name: CI

on:
  pull_request:
    branches:
      - main
      - 'feat/**'
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read

concurrency:
  group: hub-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        env:
          NEXT_PUBLIC_HUB_URL: ''
          NEXT_PUBLIC_IAM_URL: ''
          NEXT_PUBLIC_AUTH_MODE: gateway_oidc
          NEXT_PUBLIC_GATEWAY_LOGOUT_PATH: /logout
        run: bun run build

      - name: Build container image
        run: docker build -t aisphere-hub-front:${{ github.sha }} .
