name: CI

on:
  pull_request:
    branches:
      - main
      - 'feat/**'
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read

concurrency:
  group: hub-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --format json --output-file lint-results.json

      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: lint-results.json
          if-no-files-found: error

      - name: Build
        env:
          NEXT_PUBLIC_HUB_URL: ''
          NEXT_PUBLIC_IAM_URL: ''
          NEXT_PUBLIC_AUTH_MODE: gateway_oidc
          NEXT_PUBLIC_GATEWAY_LOGOUT_PATH: /logout
        run: npm run build

      - name: Build container image
        run: docker build -t aisphere-hub-front:${{ github.sha }} .
