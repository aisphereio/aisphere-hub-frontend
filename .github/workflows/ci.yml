name: CI

on:
  pull_request:
    branches:
      - main
      - 'feat/**'
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: write

concurrency:
  group: hub-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Apply one-shot Skill access refactor
        if: ${{ github.event_name == 'pull_request' && hashFiles('.github/scripts/apply_skill_access_v2.py') != '' }}
        run: |
          python3 .github/scripts/apply_skill_access_v2.py
          rm -f .github/scripts/apply_skill_access_v2.py
          git checkout origin/main -- .github/workflows/ci.yml

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        env:
          NEXT_PUBLIC_HUB_URL: ''
          NEXT_PUBLIC_IAM_URL: ''
          NEXT_PUBLIC_AUTH_MODE: gateway_oidc
          NEXT_PUBLIC_GATEWAY_LOGOUT_PATH: /logout
        run: bun run build

      - name: Build container image
        run: docker build -t aisphere-hub-front:${{ github.sha }} .

      - name: Commit one-shot implementation
        if: ${{ github.event_name == 'pull_request' && hashFiles('src/components/skills/skill-share-dialog.tsx') != '' }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --stat
          git commit -m "feat: implement organization-aware Skill access UI"
          git push origin HEAD:${{ github.head_ref }}
