name: CI

on:
  pull_request:
    branches:
      - main
      - 'feat/**'
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read

concurrency:
  group: hub-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Focused lint diagnostic
        run: |
          npm ci --silent --ignore-scripts >/dev/null 2>&1
          npx eslint src/components/kubernetes/kubernetes-environment-panel.tsx src/hooks/use-kubernetes-environments.ts src/components/pages/ops-page.tsx
