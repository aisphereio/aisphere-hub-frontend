name: Inspect Release Integration

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/inspect-release-integration.yml'

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: release-integration-sources
          path: |
            src/components/editor/skill-editor.tsx
            src/lib/api/index.ts
          if-no-files-found: error
